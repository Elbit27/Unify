{% extends 'core/base.html' %}
{% load static %}

{% block title %}Присоединиться к игре | Unify Academy{% endblock %}

{% block css %}
<style>
    .join-wrapper {
        min-height: 70vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .join-card {
        border: none;
        border-radius: 24px;
        background: #ffffff;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
        padding: 40px;
    }

    .academic-header {
        color: #212529;
        font-weight: 800;
        letter-spacing: -1px;
        margin-bottom: 10px;
    }

    .academic-subtitle {
        color: #7f8c8d;
        font-size: 0.95rem;
        margin-bottom: 35px;
    }

    .pin-container {
        display: flex;
        justify-content: center;
        gap: 12px;
        margin-bottom: 30px;
        position: relative;
    }

    .pin-box {
        width: 50px;
        height: 65px;
        border: 2px solid #edf2f7;
        border-radius: 12px;
        background: #f8fafc;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2rem;
        font-weight: 800;
        color: #2d3748;
        transition: all 0.2s ease;
    }

    .real-pin-input {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        opacity: 0;
        cursor: pointer;
        caret-color: transparent;
    }

    .pin-box.active {
        border-color: #3498db;
        background: #fff;
        box-shadow: 0 0 0 4px rgba(52, 152, 219, 0.1);
    }

    .pin-box.filled {
        border-color: #3498db;
        color: #3498db;
    }

    .btn-join {
        background-color: #3498db;
        border: none;
        border-radius: 14px;
        padding: 18px;
        font-weight: 700;
        font-size: 1.1rem;
        transition: all 0.3s ease;
    }

    .btn-join:hover {
        background-color: #2980b9;
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(52, 152, 219, 0.3);
    }

    .error-box {
        background-color: #fff5f5;
        color: #e74c3c;
        padding: 14px;
        border-radius: 10px;
        font-size: 0.9rem;
        font-weight: 600;
        border: 1px solid rgba(231, 76, 60, 0.1);
        display: none;
        margin-top: 20px;
    }
</style>
{% endblock %}

{% block content %}
<div class="join-wrapper">
    <div class="col-12 col-sm-10 col-md-8 col-lg-5 col-xl-4">
        <div class="join-card text-center">
            <h1 class="academic-header">Вход в игру</h1>
            <p class="academic-subtitle">Введите 6-значный код доступа к викторине</p>

            <form id="joinForm">
                <div class="pin-container" id="pinDisplay">
                    <div class="pin-box" data-index="0"></div>
                    <div class="pin-box" data-index="1"></div>
                    <div class="pin-box" data-index="2"></div>
                    <div class="pin-box" data-index="3"></div>
                    <div class="pin-box" data-index="4"></div>
                    <div class="pin-box" data-index="5"></div>

                    <input type="text"
                           id="pinCode"
                           class="real-pin-input"
                           maxlength="6"
                           pattern="\d*"
                           inputmode="numeric"
                           autocomplete="off"
                           autofocus>
                </div>

                <button type="button" onclick="submitPin()" class="btn btn-primary w-100 btn-join">
                    Присоединиться
                </button>
            </form>

            <div id="errorMessage" class="error-box"></div>
        </div>
    </div>
</div>

<script>
    const realInput = document.getElementById('pinCode');
    const boxes = document.querySelectorAll('.pin-box');
    const errorDiv = document.getElementById('errorMessage');

    function updateVisuals() {
        const val = realInput.value;
        boxes.forEach((box, i) => {
            box.textContent = val[i] || '';
            box.classList.toggle('filled', !!val[i]);
            box.classList.toggle('active', val.length === i);
        });
        if (val.length === 6) {
            boxes[5].classList.add('filled');
        }
    }

    realInput.addEventListener('input', updateVisuals);

    document.getElementById('pinDisplay').addEventListener('click', () => realInput.focus());

    async function submitPin() {
        const pin = realInput.value;
        if (pin.length < 6) {
            errorDiv.textContent = 'Введите все 6 цифр кода';
            errorDiv.style.display = 'block';
            return;
        }

        try {
            const response = await fetch('/game/join_by_code/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': '{{ csrf_token }}'
                },
                body: JSON.stringify({ pin_code: pin })
            });

            const data = await response.json();

            if (response.ok) {
                window.location.href = `/game/play_game/${data.game_id}/`;
            } else {
                errorDiv.textContent = data.error || 'Код не найден';
                errorDiv.style.display = 'block';
                realInput.value = '';
                updateVisuals();
            }
        } catch (e) {
            errorDiv.textContent = 'Ошибка соединения с сервером';
            errorDiv.style.display = 'block';
        }
    }

    realInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            submitPin();
        }
    });

    updateVisuals();
</script>
{% endblock %}
