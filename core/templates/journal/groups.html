{% extends 'core/base.html' %}
{% block content %}
<div class="container py-5">
    <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="{% url 'journal-subjects' %}">Все предметы</a></li>
            <li class="breadcrumb-item active">{{ subject.name }}</li>
        </ol>
    </nav>

    <h3 class="mb-4">Группы по предмету: <span class="text-primary">{{ subject.name }}</span></h3>

    <div class="row">
        <div class="col-lg-8">
            <div class="list-group shadow-sm">
                {% for group in groups %}
                <a href="{% url 'journal-view' subject.id group.id %}" class="list-group-item list-group-item-action d-flex justify-content-between align-items-center p-3">
                    <div>
                        <i class="bi bi-people-fill text-secondary me-3"></i>
                        <span class="fw-bold">Группа {{ group.name }}</span>
                        <small class="text-muted ms-2">({{ group.course_from_plan }} курс)</small>
                    </div>
                    <i class="bi bi-chevron-right"></i>
                </a>
                {% empty %}
                <div class="list-group-item text-center py-4">Нет групп, изучающих этот предмет.</div>
                {% endfor %}
            </div>
        </div>
    </div>
</div>
{% endblock %}
